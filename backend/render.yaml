services:
  - type: web
    name: stocksense-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stocksense-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-app.vercel.app   # update this after Vercel deploy

databases:
  - name: stocksense-db
    databaseName: stocksense
    plan: free
